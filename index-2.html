<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f4f5f7;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  #app {
    background: #fff;
    border-radius: 16px;
    padding: 2rem 1.5rem;
    max-width: 380px;
    width: 100%;
    text-align: center;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  h1 { font-size: 24px; font-weight: 600; color: #111; margin-bottom: 1.2rem; }
  #score-bar {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-bottom: 1.2rem;
  }
  .score-box { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .score-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.06em; }
  .score-num { font-size: 28px; font-weight: 600; }
  .score-num.x { color: #2563eb; }
  .score-num.o { color: #dc2626; }
  .score-num.tie { color: #888; }
  #status {
    font-size: 16px;
    font-weight: 500;
    color: #333;
    min-height: 24px;
    margin-bottom: 1.2rem;
  }
  #board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 1.4rem;
  }
  .cell {
    aspect-ratio: 1;
    background: #f4f5f7;
    border: 1.5px solid #ddd;
    border-radius: 12px;
    font-size: 40px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.12s;
    user-select: none;
  }
  .cell:hover:not(.taken) { background: #eaeaea; }
  .cell.taken { cursor: default; }
  .cell.x { color: #2563eb; }
  .cell.o { color: #dc2626; }
  .cell.win-cell { background: #dbeafe; border-color: #93c5fd; }
  #btn-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }
  button {
    padding: 9px 22px;
    border-radius: 8px;
    border: 1.5px solid #ddd;
    background: #f4f5f7;
    color: #333;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.12s;
  }
  button:hover { background: #e8e9eb; }
</style>
</head>
<body>
<div id="app">
  <h1>Tic Tac Toe</h1>
  <div id="score-bar">
    <div class="score-box">
      <span class="score-label">Player X</span>
      <span class="score-num x" id="score-x">0</span>
    </div>
    <div class="score-box">
      <span class="score-label">Ties</span>
      <span class="score-num tie" id="score-tie">0</span>
    </div>
    <div class="score-box">
      <span class="score-label">Player O</span>
      <span class="score-num o" id="score-o">0</span>
    </div>
  </div>
  <div id="status"></div>
  <div id="board"></div>
  <div id="btn-row">
    <button onclick="resetBoard()">New game</button>
    <button id="mode-btn" onclick="toggleMode()">vs Computer</button>
  </div>
</div>

<script>
let board = Array(9).fill('');
let current = 'X';
let gameOver = false;
let vsComputer = false;
let scores = { X: 0, O: 0, Tie: 0 };

const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

function render() {
  const b = document.getElementById('board');
  b.innerHTML = '';
  board.forEach((val, i) => {
    const cell = document.createElement('div');
    cell.className = 'cell' + (val ? ' taken ' + val.toLowerCase() : '');
    cell.textContent = val;
    cell.addEventListener('click', () => playerMove(i));
    b.appendChild(cell);
  });
  document.getElementById('score-x').textContent = scores.X;
  document.getElementById('score-o').textContent = scores.O;
  document.getElementById('score-tie').textContent = scores.Tie;
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

function checkResult(b) {
  for (const [a, bb, c] of WINS) {
    if (b[a] && b[a] === b[bb] && b[a] === b[c]) return { winner: b[a], line: [a, bb, c] };
  }
  if (b.every(v => v)) return { winner: 'Tie', line: [] };
  return null;
}

function highlightWin(line) {
  document.querySelectorAll('.cell').forEach((cell, i) => {
    if (line.includes(i)) cell.classList.add('win-cell');
  });
}

function endGame(result) {
  gameOver = true;
  highlightWin(result.line);
  scores[result.winner]++;
  render();
  highlightWin(result.line);
  setStatus(result.winner === 'Tie' ? "It's a tie!" : `Player ${result.winner} wins!`);
}

function playerMove(i) {
  if (gameOver || board[i]) return;
  board[i] = current;
  render();
  const result = checkResult(board);
  if (result) { endGame(result); return; }
  current = current === 'X' ? 'O' : 'X';
  setStatus(vsComputer && current === 'O' ? 'Computer is thinking...' : `Player ${current}'s turn`);
  if (vsComputer && current === 'O') setTimeout(computerMove, 350);
}

function computerMove() {
  if (gameOver) return;
  const idx = minimax([...board], 'O').idx;
  board[idx] = 'O';
  render();
  const result = checkResult(board);
  if (result) { endGame(result); return; }
  current = 'X';
  setStatus("Your turn (X)");
}

function minimax(b, player) {
  const res = checkResult(b);
  if (res) {
    if (res.winner === 'O') return { score: 10 };
    if (res.winner === 'X') return { score: -10 };
    return { score: 0 };
  }
  const moves = [];
  b.forEach((val, i) => {
    if (!val) {
      const nb = [...b];
      nb[i] = player;
      const s = minimax(nb, player === 'O' ? 'X' : 'O').score;
      moves.push({ idx: i, score: s });
    }
  });
  return moves.reduce((best, m) =>
    player === 'O' ? (m.score > best.score ? m : best) : (m.score < best.score ? m : best)
  );
}

function resetBoard() {
  board = Array(9).fill('');
  current = 'X';
  gameOver = false;
  render();
  setStatus(vsComputer ? 'Your turn (X)' : "Player X's turn");
}

function toggleMode() {
  vsComputer = !vsComputer;
  document.getElementById('mode-btn').textContent = vsComputer ? 'vs Human' : 'vs Computer';
  resetBoard();
}

render();
setStatus("Player X's turn");
</script>
</body>
</html>
